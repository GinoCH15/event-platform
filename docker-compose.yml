networks:
  event-net:
    driver: bridge

volumes:
  postgres-data:
  mongo-data:
  redis-data:
  rabbitmq-data:

services:

  postgres:
    image: postgres:16-alpine
    container_name: ep-postgres
    environment:
      POSTGRES_DB: eventdb
      POSTGRES_USER: eventuser
      POSTGRES_PASSWORD: eventpass
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - event-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eventuser -d eventdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongo:
    image: mongo:7-jammy
    container_name: ep-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - event-net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ep-redis
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - event-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: ep-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - event-net
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5

  event-service:
    build:
      context: ./src/EventService
      dockerfile: Dockerfile
    platform: linux/amd64
    container_name: ep-event-service
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Postgres: "Host=postgres;Port=5432;Database=eventdb;Username=eventuser;Password=eventpass;"
      ConnectionStrings__Redis: "redis:6379"
      RabbitMQ__Host: rabbitmq
      RabbitMQ__VHost: /
      RabbitMQ__Username: guest
      RabbitMQ__Password: guest
      Jwt__Key: "super-secret-key-for-demo-at-least-32-chars!"
      Jwt__Issuer: "event-platform"
      Jwt__Audience: "event-platform-clients"
    ports:
      - "5050:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - event-net
    restart: on-failure

  notification-service:
    build:
      context: ./src/NotificationService
      dockerfile: Dockerfile
    platform: linux/amd64
    container_name: ep-notification-service
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__MongoDB: "mongodb://mongo:27017"
      MongoDB__Database: notificationdb
      RabbitMQ__Host: rabbitmq
      RabbitMQ__VHost: /
      RabbitMQ__Username: guest
      RabbitMQ__Password: guest
    ports:
      - "5001:8080"
    depends_on:
      mongo:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - event-net
    restart: on-failure

  frontend:
    build:
      context: ./src/Frontend
      dockerfile: Dockerfile
    platform: linux/amd64
    container_name: ep-frontend
    ports:
      - "3001:80"
    depends_on:
      - event-service
    networks:
      - event-net
    restart: on-failure
